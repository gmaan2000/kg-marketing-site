<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Light gray background matching brand -->
  <rect width="100" height="100" fill="#e5e5e5" rx="12"/>
  
  <!-- K&G Logo - matching the actual brand logo style -->
  <g transform="translate(10, 22)">
    <!-- K vertical strokes (3 parallel lines) -->
    <rect x="0" y="0" width="7" height="56" fill="#1a1a1a"/>
    <rect x="12" y="0" width="7" height="56" fill="#1a1a1a"/>
    <rect x="24" y="0" width="7" height="56" fill="#1a1a1a"/>
    
    <!-- K diagonal strokes -->
    <polygon points="31,28 57,0 66,0 40,28 66,56 57,56 31,28" fill="#1a1a1a"/>
    
    <!-- G shape integrated -->
    <path d="M48,0 L80,0 L80,9 L57,9 L57,23 L75,23 L75,33 L57,33 L57,47 L80,47 L80,56 L48,56 Z" fill="#1a1a1a"/>
  </g>
</svg>
